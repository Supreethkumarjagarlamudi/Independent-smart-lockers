version: '3.8'

services:
  backend:
    image: supreeth902/locker-backend:latest
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database and downloaded SFace/YuNet face models
      - ./apps/local-api/data:/app/data
      - ./apps/local-api/models_cache:/app/models_cache
      - ./apps/local-api/.env:/app/.env
      # Mount dev tree to access USB Serial controllers and Webcams dynamically
      - /dev:/dev
      - /sys:/sys:ro
    privileged: true
    restart: always

  frontend:
    image: supreeth902/locker-frontend:latest
    ports:
      - "5173:80"
    restart: always
